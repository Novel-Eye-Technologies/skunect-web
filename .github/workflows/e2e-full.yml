name: E2E Full CRUD Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend (Static Export)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export with relative API URL
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_WS_URL: /ws/messages

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: out/
          retention-days: 1

  e2e-full:
    name: E2E Full (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: build-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Start test environment
        run: docker compose -f e2e/docker/docker-compose.yml up -d
        env:
          API_IMAGE: ${{ secrets.ECR_REGISTRY }}/skunect-api-dev:latest

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/actuator/health > /dev/null 2>&1; do sleep 3; done'
          echo "Backend is healthy!"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (excluding lifecycle flow)
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --grep-invert="School Lifecycle"
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:3000/api/v1

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-full-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

      - name: Teardown test environment
        if: always()
        run: docker compose -f e2e/docker/docker-compose.yml down -v

  e2e-lifecycle:
    name: E2E School Lifecycle Flow
    needs: build-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Start test environment
        run: docker compose -f e2e/docker/docker-compose.yml up -d
        env:
          API_IMAGE: ${{ secrets.ECR_REGISTRY }}/skunect-api-dev:latest

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/actuator/health > /dev/null 2>&1; do sleep 3; done'
          echo "Backend is healthy!"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run School Lifecycle E2E Flow
        run: npx playwright test e2e/specs/flows/ --workers=1
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:3000/api/v1

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-full-lifecycle
          path: blob-report/
          retention-days: 7

      - name: Teardown test environment
        if: always()
        run: docker compose -f e2e/docker/docker-compose.yml down -v

  merge-reports:
    name: Merge E2E Full Reports
    if: always()
    needs: [e2e-full, e2e-lifecycle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-full-*
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 14
