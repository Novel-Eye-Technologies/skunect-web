name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on:
            - Correctness and potential bugs
            - Security issues (XSS, auth bypass, role-based access)
            - TypeScript type safety
            - Next.js / React 19 best practices
            - Accessibility (a11y) issues
            - Consistency with existing patterns in the codebase
            Post concise, actionable review comments on specific lines where issues are found.
            Do not comment on style preferences or nitpicks.
          claude_args: "--max-turns 5"
