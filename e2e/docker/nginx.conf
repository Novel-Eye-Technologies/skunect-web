server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic route fallback for Next.js static export with generateStaticParams placeholder.
    # Routes like /homework/<id>/ or /students/<id>/ have no pre-rendered HTML for arbitrary IDs,
    # but the placeholder at /homework/_/ (and /students/_/) contains all the necessary files:
    #   - index.html (the SPA shell)
    #   - __next.*.txt (RSC flight data for client-side navigation)
    #
    # Two rules per dynamic route:
    #   1) Sub-resources (RSC data, etc.) served from the placeholder directory
    #   2) The HTML page itself

    # Homework detail: sub-resources first, then HTML fallback
    location ~ ^/homework/[^/]+/(.+)$ {
        try_files $uri /homework/_/$1;
    }
    location ~ ^/homework/[^/]+/?$ {
        try_files $uri $uri/ /homework/_/index.html;
    }

    # Student detail: sub-resources first, then HTML fallback
    location ~ ^/students/[^/]+/(.+)$ {
        try_files $uri /students/_/$1;
    }
    location ~ ^/students/[^/]+/?$ {
        try_files $uri $uri/ /students/_/index.html;
    }

    # SPA routing (Next.js static export with trailingSlash)
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Actuator proxy (health checks)
    location /actuator/ {
        proxy_pass http://backend:8080/actuator/;
    }

    # Swagger proxy
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }
    location /api-docs {
        proxy_pass http://backend:8080/api-docs;
    }
}
